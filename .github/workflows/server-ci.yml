name: Server CI

on:
  push:
    branches: [main]
    paths: ['server/**']
  pull_request:
    branches: [main]
    paths: ['server/**']

jobs:
  nest-api:
    name: NestJS Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/nest-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/nest-api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  go-services:
    name: Go Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/go-services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go mod tidy
      - run: go vet ./...
      - run: go build -o /dev/null ./cmd/server/
      - run: go test ./...
