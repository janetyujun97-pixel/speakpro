name: SpeakPro
options:
  bundleIdPrefix: com.speakpro
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  SpeakPro:
    type: application
    platform: iOS
    sources:
      - SpeakPro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speakpro.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SpeakPro/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "SpeakPro 需要使用麦克风来录制您的口语练习音频"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "SpeakPro 需要语音识别来实时转写您的口语内容"
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: minimal
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: YES
